name: Deploy Theme to Xserver

on:
  push:
    branches:
      - main
    paths:
      - 'theme/storycareer/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 10022 sv1444.xserver.jp >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 10022" \
            ./theme/storycareer/ \
            story-weaver@sv1444.xserver.jp:/home/story-weaver/storycareer.jp/public_html/wp-content/themes/storycareer/
