name: Deploy to Xserver

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /storycareer.jp/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            index.backup.html
            index-webgl.html
            index-safari-low-res.html
            index-safari-simple-circles.html
            thumbnail-designs.html
            thumbnail-designs-b.html
            test-scroll-indicators.html
            *.backup.*
