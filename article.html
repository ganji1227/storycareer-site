<style>
html{scroll-behavior:smooth}
body{background:#f5f4f0;overflow-x:hidden;font-family:'Noto Sans JP','Helvetica Neue',Arial,sans-serif;color:rgba(10,10,10,0.75);min-height:100vh;display:flex;flex-direction:column}

/* ===== Article Hero ===== */
.article-hero{padding:160px 0 40px;max-width:780px;margin:0 auto;padding-left:40px;padding-right:40px}
.article-meta{display:flex;gap:1rem;align-items:center;margin-bottom:1.2rem}
.article-date{font-family:'Noto Sans JP',sans-serif;font-weight:300;font-size:0.8rem;color:rgba(10,10,10,0.4);letter-spacing:0.05em}
.article-tag{font-family:'Noto Sans JP',sans-serif;font-weight:400;font-size:0.65rem;color:rgba(212,85,42,0.8);letter-spacing:0.08em;background:rgba(212,85,42,0.08);padding:3px 12px;border-radius:10px}
.article-title{font-family:'Noto Serif JP',serif;font-weight:300;font-size:clamp(1.4rem,2.8vw,2rem);color:rgba(10,10,10,1);letter-spacing:0.1em;line-height:1.8;margin-bottom:1.5rem}
.article-line{width:40px;height:1px;background:linear-gradient(90deg,rgba(212,85,42,0.4),transparent)}

/* ===== Thumbnail ===== */
.article-thumbnail{max-width:780px;margin:2rem auto;padding:0 40px}
.article-thumbnail img{width:100%;height:auto;border-radius:12px;display:block}
.article-thumbnail-placeholder{width:100%;height:400px;border-radius:12px;background:rgba(10,10,10,0.04);display:flex;align-items:center;justify-content:center;font-family:'Noto Sans JP',sans-serif;font-size:0.75rem;color:rgba(10,10,10,0.2);letter-spacing:0.1em}

/* ===== Article Body ===== */
.article-body{max-width:780px;margin:0 auto;padding:3rem 40px 4rem;flex:1}
.article-body h2{font-family:'Noto Serif JP',serif;font-weight:300;font-size:clamp(1.1rem,1.6vw,1.35rem);color:rgba(10,10,10,0.95);letter-spacing:0.1em;line-height:1.8;margin:3rem 0 1.2rem;padding-bottom:0.6rem;border-bottom:1px solid rgba(10,10,10,0.06)}
.article-body h3{font-family:'Noto Serif JP',serif;font-weight:300;font-size:clamp(1rem,1.3vw,1.15rem);color:rgba(10,10,10,0.9);letter-spacing:0.08em;line-height:1.7;margin:2rem 0 0.8rem}
.article-body p{font-family:'Noto Sans JP',sans-serif;font-weight:300;font-size:clamp(0.88rem,1vw,0.95rem);color:rgba(10,10,10,0.7);letter-spacing:0.04em;line-height:2.2;margin-bottom:1.5rem}
.article-body ul,.article-body ol{margin:1rem 0 1.5rem 1.5rem;font-family:'Noto Sans JP',sans-serif;font-weight:300;font-size:clamp(0.85rem,0.95vw,0.92rem);color:rgba(10,10,10,0.7);line-height:2.2}
.article-body li{margin-bottom:0.3rem}
.article-body blockquote{margin:2rem 0;padding:1.5rem 2rem;border-left:3px solid rgba(212,85,42,0.3);background:rgba(255,255,255,0.5);border-radius:0 8px 8px 0;font-style:italic;color:rgba(10,10,10,0.6)}
.article-body img{max-width:100%;height:auto;border-radius:8px;margin:1.5rem 0}
.article-body a{color:rgba(212,85,42,0.8);text-decoration:none;border-bottom:1px solid rgba(212,85,42,0.2);transition:all 0.3s}
.article-body a:hover{color:rgba(212,85,42,1);border-bottom-color:rgba(212,85,42,0.6)}

/* ===== Article Nav ===== */
.article-nav{max-width:780px;margin:0 auto;padding:0 40px 4rem;display:flex;justify-content:space-between;gap:2rem;border-top:1px solid rgba(10,10,10,0.06);padding-top:2rem}
.article-nav-item{flex:1;min-width:0}
.article-nav-item.next{text-align:right}
.article-nav-label{font-family:'Noto Sans JP',sans-serif;font-weight:300;font-size:0.7rem;color:rgba(10,10,10,0.35);letter-spacing:0.1em;margin-bottom:0.4rem}
.article-nav-title{font-family:'Noto Sans JP',sans-serif;font-weight:300;font-size:0.85rem;color:rgba(10,10,10,0.7);letter-spacing:0.04em;line-height:1.6}
.article-nav-title a{color:inherit;text-decoration:none;transition:color 0.3s}
.article-nav-title a:hover{color:rgba(212,85,42,0.9)}

/* ===== Back to list ===== */
.article-back{text-align:center;padding-bottom:4rem}
.article-back a{font-family:'Noto Sans JP',sans-serif;font-weight:300;font-size:0.85rem;color:rgba(10,10,10,0.5);letter-spacing:0.1em;text-decoration:none;transition:color 0.3s}
.article-back a:hover{color:rgba(212,85,42,0.9)}

/* ===== Responsive ===== */
@media(max-width:768px){
  .article-hero{padding:130px 24px 30px}
  .article-thumbnail{padding:0 24px}
  .article-thumbnail-placeholder{height:220px}
  .article-body{padding:2rem 24px 3rem}
  .article-nav{padding:0 24px 3rem;flex-direction:column}
  .article-nav-item.next{text-align:left}
  .article-back{padding-bottom:3rem}
}
</style>
</head>
<body>

<header class="site-header">
  <a href="/" class="site-logo">STORY CAREER</a>
  <button class="hamburger" id="hamburger" aria-label="メニュー"><span></span><span></span><span></span></button>
</header>
<nav class="nav-overlay" id="navOverlay">
  <ul class="nav-menu">
    <li><a href="/">Top<span class="nav-label">トップ</span></a></li>
    <li><a href="about.html">About<span class="nav-label">会社概要</span></a></li>
    <li><a href="services.html">Services<span class="nav-label">サービス</span></a></li>
    <li><a href="news.html">News<span class="nav-label">お知らせ</span></a></li>
    <li><a href="careers.html">Careers<span class="nav-label">採用情報</span></a></li>
    <li><a href="contact.html">Contact<span class="nav-label">お問い合わせ</span></a></li>
    <li><a href="privacy.html">Privacy Policy<span class="nav-label">プライバシーポリシー</span></a></li>
  </ul>
</nav>

<div class="article-hero fade-up" id="articleHero">
  <div class="article-meta">
    <span class="article-date" id="articleDate"></span>
    <span class="article-tag" id="articleTag"></span>
  </div>
  <h1 class="article-title" id="articleTitle">読み込み中...</h1>
  <div class="article-line"></div>
</div>

<div class="article-thumbnail fade-up" style="transition-delay:0.1s" id="articleThumb"></div>

<article class="article-body fade-up" style="transition-delay:0.15s" id="articleBody">
  <p style="text-align:center;color:rgba(10,10,10,0.3)">読み込み中...</p>
</article>

<div class="article-nav fade-up" id="articleNav" style="display:none">
  <div class="article-nav-item prev" id="navPrev"></div>
  <div class="article-nav-item next" id="navNext"></div>
</div>

<div class="article-back fade-up">

</div>

  </div>

<script src="js/animations.js"></script>
<script src="js/nav.js"></script>
<script src="js/cursor.js"></script>
<script>
(function(){
  var params=new URLSearchParams(window.location.search);
  var id=params.get('id');
  if(!id){document.getElementById('articleTitle').textContent='記事が見つかりません';document.getElementById('articleBody').innerHTML='<p style="text-align:center"><a href="news.html">記事一覧に戻る</a></p>';return}

  var API='https://storycareer.jp/wp/wp-json/wp/v2/posts/'+id+'?_embed';
  fetch(API).then(function(r){if(!r.ok)throw new Error();return r.json()}).then(function(post){
    // Title
    document.title=post.title.rendered+' | STORY CAREER';
    document.getElementById('articleTitle').textContent=post.title.rendered;

    // Date
    var date=new Date(post.date);
    document.getElementById('articleDate').textContent=date.getFullYear()+'.'+('0'+(date.getMonth()+1)).slice(-2)+'.'+('0'+date.getDate()).slice(-2);

    // Category
    var tagEl=document.getElementById('articleTag');
    if(post._embedded&&post._embedded['wp:term']&&post._embedded['wp:term'][0]&&post._embedded['wp:term'][0][0]){
      tagEl.textContent=post._embedded['wp:term'][0][0].name;
    }else{tagEl.style.display='none'}

    // Thumbnail
    var thumbEl=document.getElementById('articleThumb');
    if(post._embedded&&post._embedded['wp:featuredmedia']&&post._embedded['wp:featuredmedia'][0]){
      var src=post._embedded['wp:featuredmedia'][0].source_url;
      thumbEl.innerHTML='<img src="'+src+'" alt="'+post.title.rendered+'">';
    }else{thumbEl.style.display='none'}

    // Body
    document.getElementById('articleBody').innerHTML=post.content.rendered;

    // OGP update
    var ogTitle=document.querySelector('meta[property="og:title"]');
    if(ogTitle)ogTitle.setAttribute('content',post.title.rendered+' | STORY CAREER');

    // Prev/Next navigation
    var navEl=document.getElementById('articleNav');
    var prevEl=document.getElementById('navPrev');
    var nextEl=document.getElementById('navNext');

    // Fetch adjacent posts
    var allAPI='https://storycareer.jp/wp/wp-json/wp/v2/posts?per_page=100&orderby=date&order=desc&_fields=id,title,slug';
    fetch(allAPI).then(function(r){return r.json()}).then(function(posts){
      var idx=-1;
      for(var i=0;i<posts.length;i++){if(posts[i].id==id){idx=i;break}}
      if(idx<0)return;
      var hasNav=false;
      if(idx<posts.length-1){
        var prev=posts[idx+1];
        prevEl.innerHTML='<p class="article-nav-label">&larr; 前の記事</p><p class="article-nav-title"><a href="article.html?id='+prev.id+'">'+prev.title.rendered+'</a></p>';
        hasNav=true;
      }
      if(idx>0){
        var next=posts[idx-1];
        nextEl.innerHTML='<p class="article-nav-label">次の記事 &rarr;</p><p class="article-nav-title"><a href="article.html?id='+next.id+'">'+next.title.rendered+'</a></p>';
        hasNav=true;
      }
      if(hasNav)navEl.style.display='flex';
    });

  }).catch(function(){
    document.getElementById('articleTitle').textContent='記事が見つかりません';
    document.getElementById('articleBody').innerHTML='<p style="text-align:center"><a href="news.html">記事一覧に戻る</a></p>';
  });
})();
</script>
